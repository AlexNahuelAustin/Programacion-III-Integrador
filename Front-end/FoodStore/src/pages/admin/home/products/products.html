<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStore - Productos</title>
    <link rel="stylesheet" href="../../../../style.css">
</head>
<body class="body--admin">
    <header class="header">
        <div class="header-left">
            <a href="/src/pages/admin/home/adminHome/adminHome.html" class="logo-link">
                <img src="../../../../assets/imagen/FoodStore.png" alt="logo">
            </a>
        </div>
        <nav class="header-nav">
            <a href="/src/pages/store/home/home.html">Volver al Catálogo</a>
        </nav>
        <div class="header-right">
            <span id="nombreUsuario" class="nombre-usuario">Usuario</span>
            <button id="logoutButton" class="btn-logout">Cerrar Sesion</button>
        </div>
    </header>

    <main class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Administración</h2>
                <p>Panel de control</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/src/pages/admin/home/adminHome/adminHome.html" class="nav-item">
                    📊 Dashboard
                </a>
                <a href="/src/pages/admin/home/categories/categories.html" class="nav-item">
                    📁 Categorias
                </a>
                <a href="/src/pages/admin/home/products/products.html" class="nav-item active">
                    🍔 Productos
                </a>
                <a href="/src/pages/admin/home/orders/orders.html" class="nav-item">
                    📦 Pedidos
                </a>
                <a href="/src/pages/store/home/home.html" class="nav-item">
                    🏪 Ver Tienda
                </a>
            </nav>
        </aside>

        <section class="admin-content">
            <h1>Gestión de Productos</h1>
            <table class="tabla-admin">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tbody-productos">
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <div class="footer-contenido">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <nav class="footer-links">
                <a href="#">Términos y Condiciones</a>
                <a href="#">Privacidad</a>
                <a href="#">Contacto</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="./products.ts"></script>
</body>
</html>
