<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/imagen/FoodStore.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStore - Categorías</title>
    <link rel="stylesheet" href="../../../../style.css">
</head>
<body class="body--admin">
    <!-- Header: logo, navegación, datos usuario -->
    <header class="header">
        <div class="header-left">
            <a href="/src/pages/admin/home/adminHome/adminHome.html" class="logo-link">
                <img src="/assets/imagen/FoodStore.png" alt="logo">
            </a>
        </div>
        <nav class="header-nav">
            <a href="/src/pages/store/home/home.html">Volver al Catálogo</a>
        </nav>
        <div class="header-right">
            <span id="nombreUsuario" class="nombre-usuario">Usuario</span>
            <button id="logoutButton" class="btn-logout">Cerrar Sesion</button>
        </div>
    </header>

    <!-- Sidebar + contenido -->
    <main class="admin-container">
        <!-- Sidebar: navegación a módulos -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Administración</h2>
                <p>Panel de control</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/src/pages/admin/home/adminHome/adminHome.html" class="nav-item">
                    📊 Dashboard
                </a>
                <a href="/src/pages/admin/home/categories/categories.html" class="nav-item active">
                    📁 Categorias
                </a>
                <a href="/src/pages/admin/home/products/products.html" class="nav-item">
                    🍔 Productos
                </a>
                <a href="/src/pages/admin/home/orders/orders.html" class="nav-item">
                    📦 Pedidos
                </a>
                <a href="/src/pages/store/home/home.html" class="nav-item">
                    🏪 Ver Tienda
                </a>
            </nav>
        </aside>

        <!-- Contenido: tabla de categorías (read-only) -->
        <section class="admin-content">
            <h1>Gestión de Categorías</h1>
            <!-- Tabla que será rellenada por TypeScript con categorías desde JSON -->
            <table class="tabla-admin">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-categorias">
                    <!-- Filas generadas dinámicamente por TypeScript -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal: editar categoría (nombre, descripción) -->
    <div id="modal-categoria" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" id="cerrar-modal-categoria">&times;</span>
            <h2>Editar Categoría</h2>
            <form id="form-categoria">
                <label>Nombre:</label>
                <input type="text" id="categoria-nombre" placeholder="Ej: Hamburguesas" required>

                <label>Descripción:</label>
                <textarea id="categoria-descripcion" placeholder="Ej: Hamburguesas artesanales"></textarea>

                <button type="submit" class="btn-confirmar">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-contenido">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <nav class="footer-links">
                <a href="#">Términos y Condiciones</a>
                <a href="#">Privacidad</a>
                <a href="#">Contacto</a>
            </nav>
        </div>
    </footer>

    <!-- Script que carga y renderiza las categorías -->
    <script type="module" src="./categories.ts"></script>
</body>
</html>
