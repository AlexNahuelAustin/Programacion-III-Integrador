<html lang="en">
<head>
    <link rel="stylesheet" href="../../../style.css">
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/imagen/FoodStore.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Store</title>
</head>
<body class="body--registro--login">
    <!-- Formulario de login -->
    <section class="login--registro">
        <img src="/assets/imagen/FoodStore.png" alt="logo food store">
        <h1>Iniciar sesion</h1>
        <form id="login" class="login--registro-form">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="off" 
                    placeholder="example@example.com" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" 
                    autocomplete="off" placeholder="********" required>
            </div>
            <button type="submit" class="login--form--boton">Iniciar Sesión</button>
        </form>

        <a href="/src/pages/auth/registro/registro.html">¿No tienes cuenta? Regístrate</a>

        <!-- Credenciales de prueba -->
        <div class="credenciales-prueba">
            <p class="credenciales-titulo">Cuentas de prueba:</p>
            <p class="credenciales-admin">Admin: admin@admin.com / 123456</p>
            <p class="credenciales-usuario">Cliente: cliente@food.com / cliente123</p>
        </div>
    </section>
    <script type="module" src="../../../main.ts"></script>
    <script type="module" src="./login.ts"></script>
