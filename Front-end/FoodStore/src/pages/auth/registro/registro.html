html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/imagen/FoodStore.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body class="body--registro--login">
    <!-- Formulario de registro -->
    <section class="login--registro">
        <h1>Registro</h1>
        <form class="login--registro-form" id="registro">
            <div>
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
            </div>
            <div>
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Perez" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="micorreo@example.com" required>
            </div>
            <div>
                <label for="celular">Celular</label>
                <input type="tel" id="celular" name="celular" placeholder="1198765432" required>
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>
            <button type="submit" class="login--form--boton">Registrarse</button>
        </form>

        <!-- Mensaje de error/éxito -->
        <div id="mensaje"></div>
        <a href="/src/pages/auth/login/login.html">¿Ya tenés cuenta? Iniciar sesión</a>
    </section>

    <!-- Scripts -->
    <script type="module" src="../../../main.ts"></script>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
