<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/imagen/FoodStore.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStore - Mis Pedidos</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>
    <!-- Header: logo, navegación, carrito, usuario, logout -->
    <header class="header">
        <div class="header-izquierda">
            <a href="/src/pages/store/home/home.html" class="logo-link">
                <img src="/assets/imagen/FoodStore.png" alt="logo">
            </a>
        </div>
        <nav class="header-nav">
            <a href="/src/pages/store/home/home.html">Inicio</a>
            <a href="/src/pages/client/orders/orders.html">Mis Pedidos</a>
        </nav>
        <div class="header-derecha">
            <!-- Carrito: muestra cantidad de items -->
            <a href="/src/pages/store/cart/cart.html" class="carrito-link">
                🛒 <span id="carritoContador">0</span>
            </a>
            <!-- Nombre del usuario autenticado -->
            <span id="nombreUsuario" class="nombre-usuario">Usuario</span>
            <button id="logoutButton" class="btn-logout">Cerrar Sesion</button>
        </div>
    </header>

    <!-- Contenedor principal: lista de pedidos del usuario -->
    <main class="main">
        <h1>Mis Pedidos</h1>
        <!-- Contenedor rellenado por TypeScript con tarjetas de pedidos -->
        <div id="tabla-pedidos"></div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-contenido">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <nav class="footer-links">
                <a href="#">Términos y Condiciones</a>
                <a href="#">Privacidad</a>
                <a href="#">Contacto</a>
            </nav>
        </div>
    </footer>

    <!-- Script que carga y renderiza los pedidos del usuario -->
    <script type="module" src="./orders.ts"></script>
</body>
</html>
