<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/imagen/FoodStore.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="body--catalogo">
    <!-- Header: logo, navegación, carrito, usuario, logout -->
    <header class="header">
        <div class="header-left">
            <a href="/src/pages/store/home/home.html" class="logo-link">
                <img class="logo" src="/assets/imagen/FoodStore.png" alt="logo de food Store">
            </a>
        </div>
        <nav class="header-nav">
            <a href="/src/pages/store/home/home.html">Inicio</a>
            <a href="/src/pages/client/orders/orders.html">Mis Pedidos</a>
            <!-- Link a administración: solo visible si usuario es ADMIN -->
            <a href="/src/pages/admin/home/adminHome/adminHome.html" id="adminLink" style="display: none;">Administración</a>
        </nav>
        <div class="header-right">
            <!-- Carrito: muestra cantidad de items -->
            <a href="/src/pages/store/cart/cart.html" class="carrito-link">
                🛒 <span id="carritoContador">0</span>
            </a>
            <!-- Nombre del usuario autenticado -->
            <span id="nombreUsuario" class="nombre-usuario">Usuario</span>
            <button id="logoutButton" class="btn-logout">Cerrar Sesión</button>
        </div>
    </header>

    <!-- Contenedor principal: sidebar categorías + catálogo de productos -->
    <main class="contenedor">
        <!-- Sidebar: lista de categorías para filtrar productos -->
        <aside>
            <h3>Categorias</h3>
            <!-- Lista de categorías rellenada por TypeScript -->
            <ul id="categorias-list">
                <!-- Categorias renderizado -->
            </ul>
        </aside>

        <!-- Sección catálogo: buscador + grid de productos -->
        <section class="catalogo">
            <!-- Buscador de productos por nombre -->
            <input type="text" id="buscador" placeholder="🔍 Buscar productos...">
            <!-- Grid de productos rellenado por TypeScript -->
            <div id="contenedor-productos">
                <!-- Productos renderizado -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-contenido">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <nav class="footer-links">
                <a href="#">Términos y Condiciones</a>
                <a href="#">Privacidad</a>
                <a href="#">Contacto</a>
            </nav>
        </div>
    </footer>

    <!-- Script que carga categorías, productos, buscador y carrito -->
    <script type="module" src="./home.ts"></script>
</body>

</html>
