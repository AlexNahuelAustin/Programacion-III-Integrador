<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Catálogo</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="body--catalogo">
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <a href="/src/pages/store/home/home.html" class="logo-link">
                <img class="logo" src="../../../assets/imagen/FoodStore.png" alt="logo de food Store">
            </a>
        </div>
        <nav class="header-nav">
            <a href="/src/pages/store/home/home.html">Inicio</a>
            <a href="/src/pages/client/orders/orders.html">Mis Pedidos</a>
            <a href="/src/pages/admin/home/products/products.html" id="adminLink" style="display: none;">Administración</a>
        </nav>
        <div class="header-right">
            <a href="/src/pages/store/cart/cart.html" class="carrito-link">
                🛒 <span id="carritoContador">0</span>
            </a>
            <span id="nombreUsuario" class="nombre-usuario">Usuario</span>
            <button id="logoutButton" class="btn-logout">Cerrar Sesión</button>
        </div>
    </header>

    <main class="contenedor">
        <aside>
            <h3>Categorias</h3>
            <ul id="categorias-list">
                <!-- Categorias renderizado -->
            </ul>
        </aside>
        <section class="catalogo">
            <input type="text" id="buscador" placeholder="🔍 Buscar productos...">
            <div id="contenedor-productos">
                <!-- Productos renderizado -->
            </div>
        </section>

    </main>

    <footer>
        <div class="footer-contenido">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <nav class="footer-links">
                <a href="#">Términos y Condiciones</a>
                <a href="#">Privacidad</a>
                <a href="#">Contacto</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="./home.ts"></script>
</body>

</html>
